name: Native Image Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  native-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run tests (JVM)
        run: ./mvnw clean verify -q

      - name: Build native image
        run: |
          ./mvnw package -Dquarkus.native.enabled=true \
            -Dquarkus.native.container-build=true -DskipTests

      - name: Verify native artifact
        run: |
          ls -lh target/*-runner
          file target/*-runner

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push native Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.native
          push: true
          tags: |
            ${{ env.IMAGE }}:native-${{ github.sha }}
            ${{ env.IMAGE }}:native-manual

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF_SUMMARY
          ## Native Image Build ✅

          **Imagem:** \`${{ env.IMAGE }}\`

          **Tags publicadas:**
          - \`native-${{ github.sha }}\` (imutável)
          - \`native-manual\` (sobrescrita a cada execução manual)

          O próximo job faz deploy em produção após aprovação no environment \`production\`.
          EOF_SUMMARY

  deploy-production:
    name: Deploy Production Native
    needs: native-build
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/descontovivo/api/

      - name: Deploy native image to VPS
        uses: appleboy/ssh-action@v1
        env:
          API_DB_URL: ${{ secrets.API_DB_URL }}
          API_DB_USER: ${{ secrets.API_DB_USER }}
          API_DB_PASSWORD: ${{ secrets.API_DB_PASSWORD }}
          API_OIDC_AUTH_SERVER_URL: ${{ secrets.API_OIDC_AUTH_SERVER_URL }}
          API_OIDC_CLIENT_ID: ${{ secrets.API_OIDC_CLIENT_ID }}
          API_CORS_ORIGINS: ${{ secrets.API_CORS_ORIGINS }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_REGION: ${{ secrets.R2_REGION }}
          IMAGE_MAX_UPLOAD_BYTES: ${{ secrets.IMAGE_MAX_UPLOAD_BYTES }}
          IMAGE_TAG: native-${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: API_DB_URL,API_DB_USER,API_DB_PASSWORD,API_OIDC_AUTH_SERVER_URL,API_OIDC_CLIENT_ID,API_CORS_ORIGINS,R2_ENDPOINT,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET,R2_PUBLIC_BASE_URL,R2_REGION,IMAGE_MAX_UPLOAD_BYTES,IMAGE_TAG
          script: |
            set -Eeuo pipefail

            cd /opt/descontovivo/api
            umask 077

            echo "===== Deploy DescontoVivo API Native ====="
            echo "IMAGE_TAG nova: ${IMAGE_TAG}"

            BACKUP_FILE=".env.backup.$(date +%Y%m%d-%H%M%S)"
            if [ -f .env ]; then
              cp .env "$BACKUP_FILE"
              echo "Backup criado: $BACKUP_FILE"
              OLD_IMAGE_TAG="$(grep '^IMAGE_TAG=' .env | cut -d= -f2- || true)"
              echo "IMAGE_TAG anterior: ${OLD_IMAGE_TAG:-not-found}"
            else
              echo "Arquivo .env ainda não existe."
              OLD_IMAGE_TAG=""
            fi

            safe_val() {
              escaped=$(printf '%s' "$2" | sed "s/'/'\\\\''/g")
              printf "%s='%s'\n" "$1" "$escaped"
            }

            {
              safe_val QUARKUS_DATASOURCE_JDBC_URL "${API_DB_URL}"
              safe_val QUARKUS_DATASOURCE_USERNAME "${API_DB_USER}"
              safe_val QUARKUS_DATASOURCE_PASSWORD "${API_DB_PASSWORD}"
              safe_val OIDC_AUTH_SERVER_URL "${API_OIDC_AUTH_SERVER_URL}"
              safe_val OIDC_CLIENT_ID "${API_OIDC_CLIENT_ID}"
              safe_val QUARKUS_HTTP_CORS_ORIGINS "${API_CORS_ORIGINS}"
              safe_val R2_ENDPOINT "${R2_ENDPOINT}"
              safe_val R2_ACCESS_KEY_ID "${R2_ACCESS_KEY_ID}"
              safe_val R2_SECRET_ACCESS_KEY "${R2_SECRET_ACCESS_KEY}"
              safe_val R2_BUCKET "${R2_BUCKET}"
              safe_val R2_PUBLIC_BASE_URL "${R2_PUBLIC_BASE_URL}"
              safe_val R2_REGION "${R2_REGION}"
              safe_val IMAGE_MAX_UPLOAD_BYTES "${IMAGE_MAX_UPLOAD_BYTES}"
              echo "IMAGE_TAG=${IMAGE_TAG}"
            } > .env.next

            chmod 600 .env.next
            mv .env.next .env

            echo
            echo "===== .env aplicado ====="
            grep '^IMAGE_TAG=' .env

            echo
            echo "===== Pull da imagem native ====="
            docker compose -f docker-compose.prod.yml pull

            echo
            echo "===== Subindo container ====="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo
            echo "===== Aguardando aplicação iniciar ====="
            sleep 12

            echo
            echo "===== Health check ====="
            if ! curl -fsS https://api.descontovivo.com/q/health; then
              echo
              echo "Health check falhou."

              if [ -n "${BACKUP_FILE:-}" ] && [ -f "$BACKUP_FILE" ]; then
                echo "Fazendo rollback usando backup: $BACKUP_FILE"
                cp "$BACKUP_FILE" .env
                docker compose -f docker-compose.prod.yml up -d --remove-orphans

                sleep 12
                curl -fsS https://api.descontovivo.com/q/health

                echo
                echo "Rollback concluído."
              fi

              exit 1
            fi

            echo
            echo "===== Imagem em execução ====="
            docker inspect descontovivo-api --format='{{.Config.Image}}'

            echo
            echo "===== Status do container ====="
            docker ps --filter "name=descontovivo-api"

            echo
            echo "===== Consumo ====="
            docker stats descontovivo-api --no-stream

            echo
            echo "Deploy native concluído com sucesso."
