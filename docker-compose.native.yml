# =============================================================================
# Docker Compose — Native image override (local/dev only)
#
# Este arquivo é um override do docker-compose.yml base.
# NÃO deve ser usado sozinho nem em produção.
#
# Uso correto (local):
#   docker compose -f docker-compose.yml -f docker-compose.native.yml up --build
#
# Requisitos:
#   - Binário native já compilado:
#     ./mvnw package -Dquarkus.native.enabled=true \
#       -Dquarkus.native.container-build=true -DskipTests
#   - Ou imagem native já disponível localmente
#
# Smoke test (de fora do container):
#   curl -f http://localhost:8080/q/health
#
# A imagem runtime (ubi9/ubi-minimal) não contém curl nem ferramentas de rede,
# por isso não há healthcheck interno neste override.
#
# Para produção, veja docs/NATIVE_IMAGE.md (deploy canary manual).
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.native
    image: descontovivo-api:native
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-descontovivo}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-descontovivo}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-descontovivo}
      QUARKUS_HTTP_CORS_ORIGINS: ${QUARKUS_HTTP_CORS_ORIGINS:-http://localhost:4200}
      OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/descontovivo
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:8082/realms/descontovivo
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-descontovivo-api}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://localhost:9000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-dev-access-key}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-dev-secret-key}
      R2_BUCKET: ${R2_BUCKET:-descontovivo-promotions}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:9000/descontovivo-promotions}
      R2_REGION: ${R2_REGION:-auto}
    ports:
      - "8080:8080"
