# Application
quarkus.application.name=descontovivo-api
app.version=0.3.3

# Datasource - Dev Services will provision PostgreSQL automatically in dev/test
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}

# Flyway
quarkus.flyway.migrate-at-start=true

# OIDC
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=realm_access/roles
%dev.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8082/realms/descontovivo}
%dev.quarkus.oidc.client-id=${OIDC_CLIENT_ID:descontovivo-api}
%prod.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
%prod.quarkus.oidc.client-id=${OIDC_CLIENT_ID:descontovivo-api}
%test.quarkus.oidc.enabled=false
%test.r2.endpoint=http://localhost:9000
%test.r2.access-key-id=test-access-key
%test.r2.secret-access-key=test-secret-key
%test.r2.bucket=descontovivo-promotions-test
%test.r2.public-base-url=http://localhost:9000/descontovivo-promotions-test
%test.r2.region=auto
%test.upload.max-file-size=2097152
%test.upload.allowed-content-types=image/webp
%test.upload.presign-expiration-seconds=300

# CORS
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:4200,http://localhost:4201
%dev.quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-admin-import-token
%dev.quarkus.http.cors.exposed-headers=location
%prod.quarkus.http.cors.enabled=true
%prod.quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS}
%prod.quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
%prod.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-admin-import-token
%prod.quarkus.http.cors.exposed-headers=location

# OpenAPI
quarkus.smallrye-openapi.info-title=DescontoVivo API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:0.1.0}
quarkus.smallrye-openapi.info-description=API do DescontoVivo - portal de promoções com foco em comunidade e confiança.
quarkus.smallrye-openapi.info-contact-name=DescontoVivo Team
quarkus.smallrye-openapi.operation-id-strategy=class-method
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.jwt-security-scheme-value=Bearer
quarkus.smallrye-openapi.jwt-bearer-format=JWT
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token from Keycloak

# Admin Import
admin.import.token=${ADMIN_IMPORT_TOKEN:}
admin.import.default-author=${ADMIN_IMPORT_DEFAULT_AUTHOR:gabrielveras}

# R2 / S3 Storage
r2.endpoint=${R2_ENDPOINT:}
r2.region=${R2_REGION:auto}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET:descontovivo-promotions}
r2.public-base-url=${R2_PUBLIC_BASE_URL:https://img.descontovivo.com.br}
upload.presign-expiration-seconds=300
upload.max-file-size=${IMAGE_MAX_UPLOAD_BYTES:2097152}
upload.allowed-content-types=image/webp

# Image processing (import)
image.target-size=${IMAGE_TARGET_SIZE:300}
image.webp-quality=${IMAGE_WEBP_QUALITY:75}

# Internal Shopee importer (server-to-server only)
shopee.importer.base-url=${SHOPEE_IMPORTER_BASE_URL:http://127.0.0.1:8091}
shopee.importer.token=${SHOPEE_IMPORTER_TOKEN:}
shopee.importer.connect-timeout=${SHOPEE_IMPORTER_CONNECT_TIMEOUT:3S}
shopee.importer.read-timeout=${SHOPEE_IMPORTER_READ_TIMEOUT:12S}

# Swagger UI
%prod.quarkus.swagger-ui.enabled=false
%prod.quarkus.swagger-ui.always-include=false
%prod.quarkus.smallrye-openapi.enabled=false

# SSE Notifications
# Interval in seconds between snapshot emissions (public and admin streams)
notification.sse.interval-seconds=${NOTIFICATION_SSE_INTERVAL_SECONDS:30}

# =============================================================================
# Native Image
# =============================================================================
# Fix 1: org.apache.http.impl.auth.NTLMEngineImpl initializes SecureRandom in
# static initializer (via AWS SDK S3 transitive dep). Must be deferred to runtime.
#
# Fix 2: scrimage-webp classes (CWebpHandler, WebpHandler, etc.) resolve and extract
# GraalVM native-image: defer scrimage-webp initialization to runtime.
# The webp handlers (CWebpHandler, WebpHandler, WebpWriter) extract cwebp/dwebp binaries
# to /tmp in their static initializers. If initialized at build-time, the temp path gets
# baked into the native image but does not exist at runtime.
#
# Note: ImageReaders is NO LONGER deferred because we no longer use it.
# Image decoding (JPEG/PNG) is done via javax.imageio.ImageIO, which works natively
# without ServiceLoader issues. scrimage is used only for resize/fit + WebP output.
quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.http.impl.auth.NTLMEngineImpl,--initialize-at-run-time=com.sksamuel.scrimage.webp

# Include scrimage-webp cwebp/dwebp binaries in native image.
# Without this, Class.getResourceAsStream() returns null for the bundled binaries
# and scrimage cannot extract cwebp to /tmp for WebP conversion.
quarkus.native.resources.includes=dist_webp_binaries/**
