# Application
quarkus.application.name=descontovivo-api

# Datasource - Dev Services will provision PostgreSQL automatically in dev/test
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}

# Flyway
quarkus.flyway.migrate-at-start=true

# OIDC
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8082/realms/descontovivo}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:descontovivo-api}
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=realm_access/roles
%test.quarkus.oidc.enabled=false

# CORS
%dev.quarkus.http.cors.origins=http://localhost:4200
%prod.quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS}

# OpenAPI
quarkus.smallrye-openapi.info-title=DescontoVivo API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:0.1.0}
