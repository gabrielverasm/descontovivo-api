# Application
quarkus.application.name=descontovivo-api

# Datasource - Dev Services will provision PostgreSQL automatically in dev/test
quarkus.datasource.db-kind=postgresql

# Flyway
quarkus.flyway.migrate-at-start=true

# OIDC - disabled until Keycloak is configured
%dev.quarkus.oidc.enabled=false
%test.quarkus.oidc.enabled=false

# Admin token for moderation endpoints
app.admin-token=dev-admin-token
%test.app.admin-token=test-admin-token

# OpenAPI
quarkus.smallrye-openapi.info-title=DescontoVivo API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:0.1.0}
