services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-descontovivo}
      POSTGRES_USER: ${POSTGRES_USER:-descontovivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-descontovivo}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-descontovivo}"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    volumes:
      - ./src/main/resources/keycloak:/opt/keycloak/data/import:ro

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-descontovivo}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-descontovivo}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-descontovivo}
      QUARKUS_HTTP_CORS_ORIGINS: ${QUARKUS_HTTP_CORS_ORIGINS:-http://localhost:4200}
      OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/descontovivo
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:8082/realms/descontovivo
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-descontovivo-api}
    ports:
      - "8080:8080"

volumes:
  pgdata:
